name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[test]"
      - name: Unit and hermetic e2e battery
        # The battery drives the real duet CLI against fake agent binaries,
        # so it runs fully offline; the DUET_E2E-gated real-CLI test skips.
        run: pytest -q
